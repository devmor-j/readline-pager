name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-native:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - name: linux-x64
            platform: linux
            arch: x64
          - name: linux-arm64
            platform: linux
            arch: arm64
          - name: linux-musl-x64
            platform: linux
            arch: x64
            musl: true
            container: node:24-alpine
          - name: linux-musl-arm64
            platform: linux
            arch: arm64
            musl: true
            container: node:24-alpine

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6

        with:
          node-version: 24
          cache: "npm"

      - name: Install build tools (musl)
        if: matrix.musl == true
        run: |
          apk add --no-cache python3 make g++ linux-headers

      - name: Install dependencies for native
        run: npm i --no-audit --no-fund

      - name: Build native
        run: npm run build:native

      - name: Package native module
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_LIBC: ${{ matrix.libc || '' }}
        run: node scripts/package-native.ts "$TARGET_PLATFORM" "$TARGET_ARCH" "$TARGET_LIBC"

      - name: Publish native package
        working-directory: pkg
        run: npm publish --access public

  publish-main:
    needs: publish-native
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install full deps (for JS build)
        run: npm i --no-audit --no-fund

      - name: Build main package
        run: npm run build:js

      - name: Publish main
        run: npm publish --access public
