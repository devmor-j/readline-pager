name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-native:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - name: linux-x64
            platform: linux
            arch: x64

          - name: linux-arm64
            platform: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install deps
        run: npm i --no-audit --no-fund

      - name: Build native
        run: npm run build:native

      - name: Package native
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: node scripts/package-native.ts

      - name: Publish
        working-directory: pkg
        run: npm publish --access public

  publish-native-musl:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    container: node:24-alpine

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - name: linux-musl-x64
            arch: x64

          - name: linux-musl-arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: apk add --no-cache python3 make g++ linux-headers

      - name: Install deps
        run: npm i --no-audit --no-fund

      - name: Build native
        run: npm run build:native

      - name: Package native
        env:
          TARGET_PLATFORM: linux
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_LIBC: musl
        run: node scripts/package-native.ts

      - name: Publish
        working-directory: pkg
        run: npm publish --access public

  publish-main:
    needs: [publish-native, publish-native-musl]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install deps
        run: npm i --no-audit --no-fund

      - name: Build js
        run: npm run build:js

      - name: Publish main
        run: npm publish --access public
